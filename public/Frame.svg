<svg width="1000" height="800" viewBox="0 0 1000 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant Amber/Gold gradient that stands out beautifully on blue background -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5E0B" />
      <stop offset="100%" stop-color="#FFAE0B" />
    </linearGradient>
    <!-- Glow filter to make the vector outlines shine and pop -->
    <filter id="glow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Ring -->
  <circle cx="500" cy="450" r="380" fill="none" stroke="url(#logoGradient)" stroke-width="5" filter="url(#glow)" />
  <circle cx="140" cy="560" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />
  <circle cx="860" cy="560" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />
  <circle cx="280" cy="150" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />
  <circle cx="720" cy="150" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />

  <!-- Inner Ring -->
  <circle cx="500" cy="450" r="250" fill="none" stroke="url(#logoGradient)" stroke-width="5" stroke-dasharray="10,6" filter="url(#glow)" />
  <circle cx="270" cy="380" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />
  <circle cx="730" cy="380" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />
  <circle cx="500" cy="210" r="40" fill="#fff" stroke="url(#logoGradient)" stroke-width="4" filter="url(#glow)" />


